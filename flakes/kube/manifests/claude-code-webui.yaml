---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # "namespace" omitted since ClusterRoles are not namespaced
  name: claude-code-webui
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: claude-code-webui
  namespace: machine-learning
subjects:
- kind: ServiceAccount
  name: claude-code-webui
  namespace: machine-learning
roleRef:
  kind: ClusterRole
  name: claude-code-webui
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-code-webui
  namespace: machine-learning
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: claude-code-webui
  name: claude-code-webui
  namespace: machine-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-webui
  template:
    metadata:
      labels:
        app: claude-code-webui
    spec:
      serviceAccountName: claude-code-webui
      hostname: claude-code-webui
      containers:
      - image: docker.io/heywoodlh/claude-code-webui:0.1.56
        name: claude-code-webui
        volumeMounts:
          - name: claude-code-webui-nix
            mountPath: /nix
          - name: claude-code-webui-home
            mountPath: /home/nix
        ports:
          - name: claude-ui
            containerPort: 8080
            protocol: TCP
      volumes:
        - name: claude-code-webui-nix
          hostPath:
            path: /media/data-ssd/claude-code-webui/nix
            type: DirectoryOrCreate
        - name: claude-code-webui-home
          hostPath:
            path: /media/data-ssd/claude-code-webui/home
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: claude
  namespace: machine-learning
  labels:
    app: claude-code-webui
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "claude"
    tailscale.com/tags: "tag:adminhttp"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: claude-ui
  selector:
    app: claude-code-webui
