---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: "claude-code-webui"
  namespace: "machine-learning"
spec:
  itemPath: "vaults/Kubernetes/items/frv6yulia3fh3jpuzfwnvjfmwy"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # "namespace" omitted since ClusterRoles are not namespaced
  name: claude-code-webui
rules:
# Core API resources (read-only, no exec)
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "persistentvolumes", "persistentvolumeclaims", "nodes", "namespaces", "events", "endpoints", "serviceaccounts"]
  verbs: ["get", "list", "watch"]
# Apps API resources
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
# Extensions API resources
- apiGroups: ["extensions"]
  resources: ["deployments", "replicasets", "daemonsets", "ingresses"]
  verbs: ["get", "list", "watch"]
# Networking API resources
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies", "ingressclasses"]
  verbs: ["get", "list", "watch"]
# RBAC API resources
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]
# Metrics API resources
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
# Custom Resource Definitions
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
# Storage API resources
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses", "volumeattachments"]
  verbs: ["get", "list", "watch"]
# Batch API resources
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
# Autoscaling API resources
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
# Policy API resources
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets", "podsecuritypolicies"]
  verbs: ["get", "list", "watch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: claude-code-webui
  namespace: machine-learning
subjects:
- kind: ServiceAccount
  name: claude-code-webui
  namespace: machine-learning
roleRef:
  kind: ClusterRole
  name: claude-code-webui
  apiGroup: rbac.authorization.k8s.io
---
# Namespace-scoped Role: grants pod exec access ONLY within machine-learning
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-code-webui-exec
  namespace: machine-learning
rules:
- apiGroups: [""]
  resources: ["pods/exec", "pods/attach"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-code-webui-exec
  namespace: machine-learning
subjects:
- kind: ServiceAccount
  name: claude-code-webui
  namespace: machine-learning
roleRef:
  kind: Role
  name: claude-code-webui-exec
  apiGroup: rbac.authorization.k8s.io
---
# Namespace-scoped Role: grants full access within sandbox namespace for testing
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-code-webui-sandbox-admin
  namespace: sandbox
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-code-webui-sandbox-admin
  namespace: sandbox
subjects:
- kind: ServiceAccount
  name: claude-code-webui
  namespace: machine-learning
roleRef:
  kind: Role
  name: claude-code-webui-sandbox-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-code-webui
  namespace: machine-learning
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-init-scripts
  namespace: machine-learning
data:
  claude.sh: |-
    #!/usr/bin/env bash
    mkdir -p /home/nix/telegram
    cd /home/nix/telegram

    # Run telegram bot in tmux, assume telegram bot has been installed with `uv`
    # Install both tmux and uv with nix
    if [[ -e /home/nix/.nix-profile/bin/tmux ]] && [[ -e /home/nix/.nix-profile/bin/uv ]]
    then
      /home/nix/.nix-profile/bin/tmux new-session -d -s claude /bot.sh
    fi
    /entrypoint.sh
  bot.sh: |-
    #!/usr/bin/env bash

    if [[ ! -e /home/nix/.nix-profile/bin/uv ]]
    then
      echo "Required `uv` package not installed -- please install with `nix profile add nixpkgs#uv`"
      exit 1
    fi

    if [[ -n "${BOT_TOKEN}" ]] && [[ -n "${TELEGRAM_ADMIN_ID}" ]] && [[ "${TELEGRAM_USER_IDS}" ]]
    then
      /home/nix/.nix-profile/bin/uv tool run --from claude-telegram-bot claude-tg-bot --admin-user-id "${TELEGRAM_ADMIN_ID}" --allowed-user-ids "${TELEGRAM_USER_IDS}"
    else
      echo "Required environment variables not set. Exiting."
      exit 1
    fi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: claude-code-webui
  name: claude-code-webui
  namespace: machine-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-webui
  template:
    metadata:
      labels:
        app: claude-code-webui
    spec:
      serviceAccountName: claude-code-webui
      hostname: claude-code-webui
      containers:
        - image: docker.io/heywoodlh/claude-code-webui:0.1.56
          imagePullPolicy: Always
          name: claude-code-webui
          command: ["/claude.sh"]
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN # for rootless podman
          resources:
            limits:
              github.com/fuse: 1 # FUSE for rootless podman
          volumeMounts:
            - name: claude-code-webui-nix
              mountPath: /nix
            - name: claude-code-webui-home
              mountPath: /home/nix
            - name: claude-code-webui-supervisord
              mountPath: /etc/supervisor/conf.d
            - name: claude-entrypoint
              mountPath: /claude.sh
              subPath: claude.sh
            - name: claude-bot
              mountPath: /bot.sh
              subPath: bot.sh
            - name: flows
              mountPath: /flows
              readOnly: true
            - name: logs
              mountPath: /logs
              readOnly: true
          env:
            - name: HTTP_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: username
            - name: HTTP_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: password
            - name: BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: telegram-token
            - name: TELEGRAM_ADMIN_ID
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: telegram-admin-user-id
            - name: TELEGRAM_USER_IDS
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: telegram-allowed-user-ids
          ports:
            - name: claude-ui
              containerPort: 8080
              protocol: TCP
            - name: openclaw
              containerPort: 6000
              protocol: TCP
      volumes:
        - name: claude-code-webui-nix
          hostPath:
            path: /media/data-ssd/claude-code-webui/nix
            type: DirectoryOrCreate
        - name: claude-code-webui-home
          hostPath:
            path: /media/data-ssd/claude-code-webui/home
            type: DirectoryOrCreate
        - name: claude-code-webui-supervisord
          hostPath:
            path: /media/data-ssd/claude-code-webui/supervisord
            type: DirectoryOrCreate
        - name: claude-entrypoint
          configMap:
            name: claude-init-scripts
            defaultMode: 0777
            items:
              - key: "claude.sh"
                path: "claude.sh"
        - name: claude-bot
          configMap:
            name: claude-init-scripts
            defaultMode: 0777
            items:
              - key: "bot.sh"
                path: "bot.sh"
        - name: flows
          hostPath:
            path: /flows
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /logs
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: claude
  namespace: machine-learning
  labels:
    app: claude-code-webui
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "claude"
    tailscale.com/tags: "tag:adminhttp"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: claude-ui
  selector:
    app: claude-code-webui
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: machine-learning
  labels:
    app: claude-code-webui
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "openclaw"
    tailscale.com/tags: "tag:adminhttp"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 6000
      protocol: TCP
      name: claude-ui
  selector:
    app: claude-code-webui
---
