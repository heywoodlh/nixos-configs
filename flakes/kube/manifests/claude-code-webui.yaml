              mountPath: /etc/supervisor/conf.d
            - name: signal-cli-config
              mountPath: /home/nix/.config/signal-cli
            - name: signal-cli-local
              mountPath: /home/nix/.local/share/signal-cli
            - name: flows
              mountPath: /flows
              readOnly: true
            - name: logs
              mountPath: /logs
              readOnly: true
          env:
            - name: HTTP_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: username
            - name: HTTP_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: password
          ports:
            - name: hermes-ui
              containerPort: 8080
              protocol: TCP
      volumes:
        - name: claude-code-webui-nix
          hostPath:
            path: /media/data-ssd/claude-code-webui/nix
            type: DirectoryOrCreate
        - name: claude-code-webui-home
          hostPath:
            path: /media/data-ssd/claude-code-webui/home
            type: DirectoryOrCreate
        - name: hermes-supervisord
          hostPath:
            path: /media/data-ssd/claude-code-webui/hermes-supervisord
            type: DirectoryOrCreate
        - name: signal-cli-config
          hostPath:
            path: /media/data-ssd/claude-code-webui/hermes-signal-cli/config
            type: DirectoryOrCreate
        - name: signal-cli-local
          hostPath:
            path: /media/data-ssd/claude-code-webui/hermes-signal-cli/local
            type: DirectoryOrCreate
        - name: flows
          hostPath:
            path: /flows
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /logs
            type: DirectoryOrCreate
---
