---
apiVersion: v1
kind: Service
metadata:
  name: llama-swap
  namespace: machine-learning
  labels:
    app.kubernetes.io/name: llama-swap
    app.kubernetes.io/instance: llama-swap
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "llama-swap"
    tailscale.com/tags: "tag:http"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: llama-swap
      protocol: TCP
      name: llama-swap
  selector:
    app.kubernetes.io/name: llama-swap
    app.kubernetes.io/instance: llama-swap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-swap-config
  namespace: machine-learning
data:
  config.yaml: |-
    healthCheckTimeout: 300
    logLevel: info
    logToStdout: "proxy"

    models:
      "llama3.1:8b":
        proxy: "http://127.0.0.1:${PORT}"
        cmd: >-
          llama-server
          --model /models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf
          --port ${PORT}
          --host 127.0.0.1
          --ctx-size 8192
          --threads 4
          -ngl 99
  download.sh: |-
    #!/bin/sh
    MODEL="/models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
    URL="https://huggingface.co/bartowski/Meta-Llama-3.1-8B-Instruct-GGUF/resolve/main/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
    if [ -f "${MODEL}" ]; then
      echo "Model already exists, skipping download"
    else
      echo "Downloading model..."
      curl -C - -L "${URL}" -o "${MODEL}"
    fi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-swap
  namespace: machine-learning
  labels:
    app.kubernetes.io/name: llama-swap
    app.kubernetes.io/instance: llama-swap
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-swap
      app.kubernetes.io/instance: llama-swap
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llama-swap
        app.kubernetes.io/instance: llama-swap
    spec:
      securityContext:
        {}
      initContainers:
        - name: model-downloader
          image: docker.io/curlimages/curl
          securityContext:
            runAsUser: 1000
          command:
            - "/download.sh"
          volumeMounts:
            - name: models
              mountPath: /models
            - name: llama-swap-downloader
              mountPath: /download.sh
              subPath: download.sh
      containers:
        - name: llama-swap
          securityContext:
            privileged: true
          image: "ghcr.io/mostlygeek/llama-swap:intel"
          imagePullPolicy: IfNotPresent
          ports:
            - name: llama-swap
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: models
              mountPath: /models
            - name: llama-swap-config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              gpu.intel.com/i915: "1"
            limits:
              gpu.intel.com/i915: "1"
      volumes:
        - name: models
          hostPath:
            path: /media/data-ssd/llama-swap/models
            type: DirectoryOrCreate
        - name: llama-swap-config
          configMap:
            name: llama-swap-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: llama-swap-downloader
          configMap:
            name: llama-swap-config
            defaultMode: 0777
            items:
              - key: download.sh
                path: download.sh
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: litellm-db
  namespace: machine-learning
spec:
  itemPath: "vaults/Kubernetes/items/zvj57fg53iipc4vxgobcer5j4q"
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: machine-learning
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "litellm"
    tailscale.com/tags: "tag:adminhttp"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: litellm
      protocol: TCP
      name: litellm
  selector:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: machine-learning
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
      app.kubernetes.io/instance: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/instance: litellm
    spec:
      containers:
        - name: litellm
          image: "ghcr.io/berriai/litellm:v1.83.3.rc.1"
          imagePullPolicy: IfNotPresent
          args:
            - --port
            - "4000"
          ports:
            - name: litellm
              containerPort: 4000
              protocol: TCP
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: db-password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: db-name
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@localhost:5432/$(DB_NAME)"
            - name: STORE_MODEL_IN_DB
              value: "True"
            - name: UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: username
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: password
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: master-key
          volumeMounts:
            - name: litellm-home-config
              mountPath: /root/.config
              subPath: config.yaml
        - name: postgres
          image: "postgres:16"
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: db-name
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: db-password
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: litellm-db
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: litellm-home-config
          hostPath:
            path: "/media/data-ssd/llama-swap/litellm/config"
            type: DirectoryOrCreate
        - name: litellm-db
          hostPath:
            path: "/media/data-ssd/llama-swap/litellm/db"
            type: DirectoryOrCreate
