---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: "claude-code-webui"
  namespace: "@namespace@"
spec:
  itemPath: "vaults/Kubernetes/items/frv6yulia3fh3jpuzfwnvjfmwy"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # "namespace" omitted since ClusterRoles are not namespaced
  name: claude-code-webui
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: claude-code-webui
  namespace: @namespace@
subjects:
- kind: ServiceAccount
  name: claude-code-webui
  namespace: @namespace@
roleRef:
  kind: ClusterRole
  name: claude-code-webui
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-code-webui
  namespace: @namespace@
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-init-scripts
  namespace: @namespace@
data:
  claude.sh: |-
    #!/usr/bin/env bash
    mkdir -p /home/nix/telegram
    cd /home/nix/telegram

    # Run telegram bot in tmux, assume telegram bot has been installed with `uv`
    # Install both tmux and uv with nix
    if [[ -e /home/nix/.nix-profile/bin/tmux ]] && [[ -e /home/nix/.nix-profile/bin/uv ]]
    then
      /home/nix/.nix-profile/bin/tmux new-session -d -s claude /bot.sh
    fi
    /entrypoint.sh
  bot.sh: |-
    #!/usr/bin/env bash

    if [[ ! -e /home/nix/.nix-profile/bin/uv ]]
    then
      echo "Required `uv` package not installed -- please install with `nix profile add nixpkgs#uv`"
      exit 1
    fi

    if [[ -n "${BOT_TOKEN}" ]] && [[ -n "${TELEGRAM_ADMIN_ID}" ]] && [[ "${TELEGRAM_USER_IDS}" ]]
    then
      /home/nix/.nix-profile/bin/uv tool run --from claude-telegram-bot claude-tg-bot --admin-user-id "${TELEGRAM_ADMIN_ID}" --allowed-user-ids "${TELEGRAM_USER_IDS}"
    else
      echo "Required environment variables not set. Exiting."
      exit 1
    fi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: claude-code-webui
  name: claude-code-webui
  namespace: @namespace@
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code-webui
  template:
    metadata:
      labels:
        app: claude-code-webui
    spec:
      serviceAccountName: claude-code-webui
      hostname: claude-code-webui
      containers:
        - image: @image@
          imagePullPolicy: Always
          name: claude-code-webui
          command: ["/claude.sh"]
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN # for rootless podman
          resources:
            limits:
              github.com/fuse: 1 # FUSE for rootless podman
          volumeMounts:
            - name: claude-code-webui-nix
              mountPath: /nix
            - name: claude-code-webui-home
              mountPath: /home/nix
            - name: claude-entrypoint
              mountPath: /claude.sh
              subPath: claude.sh
            - name: claude-bot
              mountPath: /bot.sh
              subPath: bot.sh
          env:
            - name: BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: telegram-token
            - name: TELEGRAM_ADMIN_ID
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: telegram-admin-user-id
            - name: TELEGRAM_USER_IDS
              valueFrom:
                secretKeyRef:
                  name: claude-code-webui
                  key: telegram-allowed-user-ids
          ports:
            - name: claude-ui
              containerPort: 8080
              protocol: TCP
      volumes:
        - name: claude-code-webui-nix
          hostPath:
            path: @hostfolder@/nix
            type: DirectoryOrCreate
        - name: claude-code-webui-home
          hostPath:
            path: @hostfolder@/home
            type: DirectoryOrCreate
        - name: claude-entrypoint
          configMap:
            name: claude-init-scripts
            defaultMode: 0777
            items:
              - key: "claude.sh"
                path: "claude.sh"
        - name: claude-bot
          configMap:
            name: claude-init-scripts
            defaultMode: 0777
            items:
              - key: "bot.sh"
                path: "bot.sh"
---
apiVersion: v1
kind: Service
metadata:
  name: claude
  namespace: @namespace@
  labels:
    app: claude-code-webui
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: claude-ui
  selector:
    app: claude-code-webui
