---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: spindle
    app.kubernetes.io/instance: spindle
  name: spindle
  namespace: @namespace@
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: spindle-clusterrolebinding
  labels:
    app.kubernetes.io/name: spindle
    app.kubernetes.io/instance: spindle
subjects:
  - kind: ServiceAccount
    name: spindle
    namespace: @namespace@
roleRef:
  kind: ClusterRole
  name: spindle-clusterrole
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spindle
  namespace: @namespace@
  labels:
    app.kubernetes.io/name: spindle
    app.kubernetes.io/instance: spindle
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spindle
  namespace: @namespace@
  labels:
    app.kubernetes.io/name: spindle
    app.kubernetes.io/instance: spindle
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spindle
subjects:
- kind: ServiceAccount
  name: spindle
  namespace: @namespace@
---
apiVersion: v1
kind: Service
metadata:
  name: spindle
  namespace: @namespace@
  labels:
    app: spindle
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "spindle"
    tailscale.com/tags: "tag:http"
spec:
  type: ClusterIP
  ports:
  - name: spindle
    port: 80
    targetPort: 6555
    protocol: TCP
  selector:
    app: spindle
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spindle
  namespace: @namespace@
  labels:
    app: spindle
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: spindle
  template:
    metadata:
      labels:
        app: spindle
    spec:
      serviceAccountName: spindle
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: spindle
        image: "@image@"
        imagePullPolicy: Always
        ports:
        - name: spindle
          containerPort: 6555
          protocol: TCP
        volumeMounts:
        - name: datadir
          mountPath: /data
        - name: dockerdir
          mountPath: /var/lib/docker
        env:
          - name: SPINDLE_SERVER_HOSTNAME
            value: "spindle.heywoodlh.io"
          - name: SPINDLE_SERVER_DEV
            value: 'false'
          - name: SPINDLE_SERVER_OWNER
            value: "did:plc:ycnss4fntzi3rjuueb7loq3x"
        securityContext:
          privileged: true
      volumes:
      - name: datadir
        hostPath:
          path: @hostfolder@/data
          type: DirectoryOrCreate
      - name: dockerdir
        hostPath:
          path: @hostfolder@/docker
          type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/hostname: @nodename@
